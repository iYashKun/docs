<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>wèpláy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --purple: #a855f7;
            --purple-dark: #7e22ce;
        }

        * {
            user-select: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a0a0a, #1a0033);
            color: #e5e5e5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .song-row {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .song-row:hover {
            transform: translateX(8px);
            background: rgba(168, 85, 247, 0.1) !important;
            box-shadow: 0 10px 15px -3px rgba(168, 85, 247, 0.2);
        }

        .progress-bar {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 9999px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(to right, #a855f7, #c084fc);
            transition: width 0.1s linear;
        }

        .search-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(168, 85, 247, 0.3);
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
            background: rgba(255,255,255,0.1);
        }

        .player-card {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.5);
        }

        .neon-text {
            text-shadow: 0 0 15px rgba(168, 85, 247, 0.6);
        }
    </style>
</head>
<body class="flex flex-col items-center">
    <div class="player-container w-full max-w-2xl mx-auto px-4 py-6">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <h1 class="logo-font text-4xl font-bold tracking-tighter text-white neon-text">wèpláy</h1>
            
            <div class="flex-1 max-w-md mx-8">
                <form id="searchForm" class="relative">
                    <div class="search-form glass rounded-3xl flex items-center px-5 py-2">
                        <input id="searchInput" 
                               class="search-input flex-1 bg-transparent text-sm placeholder-gray-400 focus:outline-none px-4 py-3 rounded-3xl text-white"
                               type="search" 
                               placeholder="Search songs, artists, albums..." 
                               autocomplete="off">
                        <button type="submit" 
                                class="w-10 h-10 bg-gradient-to-br from-purple-500 to-violet-600 hover:from-purple-600 hover:to-violet-700 rounded-2xl flex items-center justify-center transition-all active:scale-95">
                            <span class="iconify text-white text-xl" data-icon="mdi:magnify"></span>
                        </button>
                    </div>
                </form>
            </div>
        </header>

        <main class="flex-1">
            <div id="results" class="space-y-2 min-h-[400px]"></div>
        </main>

        <!-- Now Playing -->
        <div id="player-card" class="glass player-card rounded-3xl p-6 mt-8">
            <div class="flex gap-6">
                <img id="current-song-image" 
                     src="https://placehold.co/400x400/png?text=No+Image" 
                     alt="Album Art"
                     class="w-32 h-32 object-cover rounded-2xl shadow-2xl ring-1 ring-white/10">

                <div class="flex-1 min-w-0">
                    <h2 id="current-song-title" class="text-xl font-semibold text-white truncate">Select a song</h2>
                    <p id="current-song-artist" class="text-gray-400 text-sm mt-1 truncate"></p>

                    <div class="mt-6">
                        <div class="progress-bar">
                            <div id="progress" class="progress w-0"></div>
                        </div>
                        <div class="flex justify-between text-xs text-gray-400 mt-2">
                            <span id="current-time">0:00</span>
                            <span id="duration">0:00</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-8 mt-6">
                        <button id="prev-btn" class="text-gray-400 hover:text-white transition-colors">
                            <span class="iconify text-3xl" data-icon="mdi:skip-previous"></span>
                        </button>
                        <button id="play-pause-btn" 
                                class="w-14 h-14 bg-white text-black rounded-2xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all">
                            <span class="iconify text-4xl" data-icon="mdi:play"></span>
                        </button>
                        <button id="next-btn" class="text-gray-400 hover:text-white transition-colors">
                            <span class="iconify text-3xl" data-icon="mdi:skip-next"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Extra Controls -->
            <div class="flex justify-end gap-3 mt-6">
                <button id="favorite-btn" class="p-3 hover:bg-white/10 rounded-2xl transition-all">
                    <span class="iconify text-2xl" data-icon="mdi:heart-outline"></span>
                </button>
                <button id="share-btn" class="p-3 hover:bg-white/10 rounded-2xl transition-all">
                    <span class="iconify text-2xl" data-icon="mdi:share-variant"></span>
                </button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="none"></audio>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchInput = document.getElementById('searchInput');
        const results = document.getElementById('results');
        const audioPlayer = document.getElementById('audioPlayer');

        let songs = [];
        let currentIndex = -1;
        let isPlaying = false;

        // New API Mapping
        async function searchSongs(query) {
            results.innerHTML = `
                <div class="flex justify-center items-center h-64">
                    <div class="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                </div>`;

            try {
                const res = await fetch(`https://saavn.sumit.co/api/search/songs?query=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (data.success && data.data?.results?.length > 0) {
                    songs = data.data.results.map(song => ({
                        id: song.id,
                        name: song.name || 'Unknown',
                        artist: song.artists?.primary?.[0]?.name || song.artists?.all?.[0]?.name || 'Unknown Artist',
                        image: song.image?.find(img => img.quality === "500x500")?.url || 
                               song.image?.[0]?.url || 
                               'https://placehold.co/400x400/png?text=No+Image',
                        url: song.downloadUrl?.find(d => d.quality === "320kbps")?.url || 
                             song.downloadUrl?.[song.downloadUrl.length - 1]?.url || ''
                    }));

                    renderSongs();
                } else {
                    results.innerHTML = `<div class="text-center py-20 text-gray-400">No results found for "<span class="text-purple-400">${query}</span>"</div>`;
                    songs = [];
                }
            } catch (err) {
                results.innerHTML = `<div class="text-center py-20 text-red-400">Failed to fetch songs. Try again.</div>`;
            }
        }

        function renderSongs() {
            results.innerHTML = '';
            songs.forEach((song, i) => {
                const row = document.createElement('div');
                row.className = `song-row glass rounded-2xl p-4 flex items-center gap-4 cursor-pointer group`;
                row.innerHTML = `
                    <img src="${song.image}" class="w-14 h-14 object-cover rounded-xl" loading="lazy">
                    <div class="flex-1 min-w-0">
                        <p class="font-medium text-white truncate">${song.name}</p>
                        <p class="text-sm text-gray-400 truncate">${song.artist}</p>
                    </div>
                    <button class="w-10 h-10 bg-white/10 hover:bg-purple-500 rounded-2xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        <span class="iconify text-2xl text-white" data-icon="mdi:play"></span>
                    </button>
                `;
                row.addEventListener('click', () => loadSong(i));
                results.appendChild(row);
            });
        }

        function loadSong(index) {
            if (index < 0 || index >= songs.length) return;
            currentIndex = index;
            const song = songs[index];

            audioPlayer.src = song.url;
            audioPlayer.play().catch(() => {});

            // Update player UI
            document.getElementById('current-song-image').src = song.image;
            document.getElementById('current-song-title').textContent = song.name;
            document.getElementById('current-song-artist').textContent = song.artist;
        }

        // Audio Controls
        audioPlayer.addEventListener('play', () => {
            isPlaying = true;
            document.getElementById('play-pause-btn').innerHTML = `<span class="iconify text-4xl" data-icon="mdi:pause"></span>`;
        });

        audioPlayer.addEventListener('pause', () => {
            isPlaying = false;
            document.getElementById('play-pause-btn').innerHTML = `<span class="iconify text-4xl" data-icon="mdi:play"></span>`;
        });

        audioPlayer.addEventListener('timeupdate', () => {
            const current = audioPlayer.currentTime;
            const duration = audioPlayer.duration || 0;
            document.getElementById('current-time').textContent = formatTime(current);
            document.getElementById('duration').textContent = formatTime(duration);
            document.getElementById('progress').style.width = `${(current / duration) * 100 || 0}%`;
        });

        audioPlayer.addEventListener('ended', () => {
            if (currentIndex < songs.length - 1) loadSong(currentIndex + 1);
        });

        // Player Buttons
        document.getElementById('play-pause-btn').addEventListener('click', () => {
            if (isPlaying) audioPlayer.pause();
            else audioPlayer.play();
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) loadSong(currentIndex - 1);
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < songs.length - 1) loadSong(currentIndex + 1);
        });

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' : ''}${sec}`;
        }

        // Search Handlers
        searchForm.addEventListener('submit', e => {
            e.preventDefault();
            const query = searchInput.value.trim();
            if (query) searchSongs(query);
        });

        searchInput.addEventListener('input', debounce((e) => {
            const query = e.target.value.trim();
            if (query.length > 2) searchSongs(query);
        }, 400));

        function debounce(func, delay) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), delay);
            };
        }

        // Load from URL
        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('search');
        if (initialQuery) {
            searchInput.value = initialQuery;
            searchSongs(initialQuery);
        }
    </script>
</body>
</html>
