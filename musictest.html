<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>wèpláy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
        }

        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .glass { 
            background: rgba(30, 30, 40, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.08);
        }

        .song-row:hover {
            background: rgba(255,255,255,0.08);
        }

        .progress-bar, .volume-bar {
            height: 4px;
            background: #555;
            border-radius: 9999px;
            cursor: pointer;
        }

        .progress, .volume-fill {
            height: 100%;
            background: #1ed760;
            transition: width 0.1s;
        }

        .neon-text { text-shadow: 0 0 15px #1ed760; }
    </style>
</head>
<body class="flex">

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-screen">
        <!-- Top Bar -->
        <header class="h-16 glass flex items-center px-8 border-b border-white/10">
            <h1 class="logo-font text-3xl font-bold tracking-tight text-white neon-text">wèpláy</h1>
            
            <div class="flex-1 max-w-xl mx-12">
                <form id="searchForm" class="glass rounded-full px-6 py-2 flex items-center">
                    <input id="searchInput" 
                           class="flex-1 bg-transparent focus:outline-none text-sm placeholder-gray-400"
                           type="text" placeholder="What do you want to play?">
                    <button type="submit">
                        <span class="iconify text-xl text-gray-400" data-icon="mdi:magnify"></span>
                    </button>
                </form>
            </div>
        </header>

        <!-- Search Results -->
        <main class="flex-1 overflow-auto p-8" id="main-content">
            <div id="results" class="space-y-1"></div>
        </main>

        <!-- Player -->
        <div class="glass border-t border-white/10 p-4">
            <div class="flex items-center gap-6">
                <!-- Now Playing Info -->
                <div class="flex items-center gap-4 w-72">
                    <img id="current-song-image" src="https://placehold.co/400x400/111/fff?text=♪" 
                         class="w-14 h-14 rounded-lg object-cover">
                    <div>
                        <p id="current-song-title" class="font-medium text-sm">Not playing</p>
                        <p id="current-song-artist" class="text-xs text-gray-400"></p>
                    </div>
                </div>

                <!-- Center Controls -->
                <div class="flex-1 flex flex-col items-center">
                    <div class="flex items-center gap-8">
                        <button id="prev-btn"><span class="iconify text-2xl text-gray-400 hover:text-white" data-icon="mdi:skip-previous"></span></button>
                        <button id="play-pause-btn" class="w-10 h-10 bg-white text-black rounded-full flex items-center justify-center hover:scale-105">
                            <span class="iconify text-3xl" data-icon="mdi:play"></span>
                        </button>
                        <button id="next-btn"><span class="iconify text-2xl text-gray-400 hover:text-white" data-icon="mdi:skip-next"></span></button>
                    </div>

                    <div class="w-full max-w-md mt-3 flex items-center gap-3">
                        <span id="current-time" class="text-xs w-10 text-right">0:00</span>
                        <div id="progress-container" class="progress-bar flex-1">
                            <div id="progress" class="progress"></div>
                        </div>
                        <span id="total-duration" class="text-xs w-10">0:00</span>
                    </div>
                </div>

                <!-- Right Side -->
                <div class="flex items-center gap-4 w-72 justify-end">
                    <button id="queue-btn" class="text-gray-400 hover:text-white">
                        <span class="iconify text-2xl" data-icon="mdi:playlist-play"></span>
                    </button>
                    
                    <button id="favorite-btn" class="text-gray-400 hover:text-white">
                        <span class="iconify text-2xl" data-icon="mdi:heart-outline"></span>
                    </button>

                    <button id="share-btn" class="text-gray-400 hover:text-white">
                        <span class="iconify text-2xl" data-icon="mdi:share-variant"></span>
                    </button>

                    <!-- Volume -->
                    <div class="flex items-center gap-2 w-32">
                        <span class="iconify text-gray-400" data-icon="mdi:volume-high"></span>
                        <div id="volume-container" class="volume-bar flex-1">
                            <div id="volume-fill" class="volume-fill w-[80%]"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Queue Sidebar (Spotify Style) -->
    <div id="queue-sidebar" class="w-80 glass border-l border-white/10 hidden flex-col h-screen">
        <div class="p-6 border-b border-white/10">
            <h3 class="font-semibold flex items-center gap-2">
                <span class="iconify" data-icon="mdi:playlist-play"></span> 
                Next Up
            </h3>
        </div>
        <div id="queue-list" class="flex-1 overflow-auto p-4 space-y-2"></div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        const API_BASE = atob('aHR0cHM6Ly9zYWF2bi5zdW1pdC5jby9hcGkv') + 'search/songs';
        let songs = [];
        let queue = [];
        let currentIndex = -1;
        let isPlaying = false;
        let volume = 0.8;

        const audio = document.getElementById('audioPlayer');
        audio.volume = volume;

        // Search
        async function searchSongs(query) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="text-center py-12 text-gray-400">Searching...</div>`;

            try {
                const res = await fetch(`${API_BASE}?query=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (data.success && data.data?.results) {
                    songs = data.data.results.map((song, idx) => ({
                        id: song.id,
                        name: song.name,
                        artist: song.artists?.primary?.map(a => a.name).join(', ') || 'Unknown',
                        image: song.image?.find(i => i.quality === "500x500")?.url || song.image?.[0]?.url || '',
                        url: song.downloadUrl?.find(d => d.quality === "320kbps")?.url || song.downloadUrl?.[song.downloadUrl.length-1]?.url || '',
                        duration: song.duration || 0
                    }));
                    renderResults();
                    queue = [...songs];
                    updateQueueUI();
                }
            } catch(e) {}
        }

        function renderResults() {
            const container = document.getElementById('results');
            container.innerHTML = songs.map((song, i) => `
                <div onclick="playSong(${i})" class="song-row glass rounded-xl p-4 flex items-center gap-4 cursor-pointer">
                    <img src="${song.image}" class="w-12 h-12 rounded-md">
                    <div class="flex-1">
                        <p class="font-medium">${song.name}</p>
                        <p class="text-sm text-gray-400">${song.artist}</p>
                    </div>
                    <span class="text-xs text-gray-500">${formatTime(song.duration)}</span>
                </div>
            `).join('');
        }

        function playSong(index) {
            currentIndex = index;
            const song = songs[index];
            if (!song) return;

            audio.src = song.url;
            audio.play();

            document.getElementById('current-song-image').src = song.image;
            document.getElementById('current-song-title').textContent = song.name;
            document.getElementById('current-song-artist').textContent = song.artist;

            // Update URL
            history.replaceState(null, '', `?play=${song.id}`);
        }

        // Audio Controls
        audio.addEventListener('timeupdate', () => {
            const progress = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress').style.width = `${progress}%`;
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
            document.getElementById('total-duration').textContent = formatTime(audio.duration);
        });

        audio.addEventListener('ended', () => {
            if (currentIndex < queue.length - 1) playSong(currentIndex + 1);
        });

        // Play/Pause
        document.getElementById('play-pause-btn').addEventListener('click', () => {
            isPlaying = !isPlaying;
            isPlaying ? audio.play() : audio.pause();
            document.getElementById('play-pause-btn').innerHTML = isPlaying ? 
                `<span class="iconify text-3xl" data-icon="mdi:pause"></span>` : 
                `<span class="iconify text-3xl" data-icon="mdi:play"></span>`;
        });

        // Volume
        const volumeContainer = document.getElementById('volume-container');
        volumeContainer.addEventListener('click', (e) => {
            const rect = volumeContainer.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            volume = Math.max(0, Math.min(1, percent));
            audio.volume = volume;
            document.getElementById('volume-fill').style.width = `${volume * 100}%`;
        });

        // Queue
        function updateQueueUI() {
            const queueList = document.getElementById('queue-list');
            queueList.innerHTML = queue.map((song, i) => `
                <div onclick="playSong(${i})" class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/10 cursor-pointer ${i === currentIndex ? 'bg-white/10' : ''}">
                    <img src="${song.image}" class="w-10 h-10 rounded">
                    <div class="flex-1 text-sm">
                        <p>${song.name}</p>
                        <p class="text-gray-400 text-xs">${song.artist}</p>
                    </div>
                </div>
            `).join('');
        }

        document.getElementById('queue-btn').addEventListener('click', () => {
            const sidebar = document.getElementById('queue-sidebar');
            sidebar.classList.toggle('hidden');
            sidebar.classList.toggle('flex');
        });

        // Share
        document.getElementById('share-btn').addEventListener('click', () => {
            if (currentIndex === -1) return;
            const song = songs[currentIndex];
            history.replaceState(null, '', `?share=${song.id}`);
            alert(`Share link copied: ${window.location.href}`);
        });

        function formatTime(secs) {
            if (!secs) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Search Handler
        document.getElementById('searchForm').addEventListener('submit', e => {
            e.preventDefault();
            const query = document.getElementById('searchInput').value.trim();
            if (query) searchSongs(query);
        });

        // Load from URL
        const params = new URLSearchParams(window.location.search);
        if (params.has('play') || params.has('share')) {
            // For demo, just trigger a default search
            document.getElementById('searchInput').value = "";
            searchSongs("");
        }
    </script>
</body>
</html>
