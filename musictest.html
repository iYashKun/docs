<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>wèpláy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0a1f, #1a0033, #0a0a0a);
            color: #e5e5e5;
            min-height: 100vh;
        }

        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .glass-heavy {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(24px);
        }

        .song-row {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .song-row:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(168, 85, 247, 0.25);
        }

        .progress-bar {
            height: 5px;
            background: rgba(255,255,255,0.12);
            border-radius: 9999px;
        }
        .progress {
            height: 100%;
            background: linear-gradient(90deg, #a855f7, #c026d3, #db2777);
            transition: width 0.1s ease;
        }

        .neon-glow {
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.7);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-2xl mx-auto">

        <!-- Header: https://saavn.sumit.co/docs#tag/search/GET/api/search/artists -->
        <header class="flex items-center justify-between mb-10">
            <h1 class="logo-font text-5xl font-bold tracking-tighter text-white neon-glow">wèpláy</h1>
            
            <div class="flex-1 max-w-lg mx-8">
                <form id="searchForm" class="relative">
                    <div class="glass rounded-3xl flex items-center px-6 py-2">
                        <input id="searchInput" 
                               class="flex-1 bg-transparent text-lg placeholder-gray-400 focus:outline-none py-4"
                               type="text" 
                               placeholder="What are you craving today?">
                        <button type="submit" 
                                class="w-12 h-12 bg-gradient-to-br from-purple-500 via-violet-600 to-fuchsia-600 rounded-2xl flex items-center justify-center hover:scale-110 transition-transform">
                            <span class="iconify text-2xl text-white" data-icon="mdi:magnify"></span>
                        </button>
                    </div>
                </form>
            </div>
        </header>

        <main>
            <div id="results" class="space-y-3"></div>
        </main>

        <!-- Premium Player -->
        <div id="player-card" class="glass-heavy rounded-3xl p-8 mt-12 shadow-2xl">
            <div class="flex gap-8">
                <div class="relative">
                    <img id="current-song-image" 
                         src="https://placehold.co/400x400/1a0033/ffffff?text=♪" 
                         class="w-40 h-40 object-cover rounded-3xl shadow-2xl ring-4 ring-purple-500/20" alt="Cover">
                    <div class="absolute -bottom-2 -right-2 bg-black/70 text-xs px-3 py-1 rounded-2xl backdrop-blur-md" id="duration-badge">0:00</div>
                </div>

                <div class="flex-1">
                    <h2 id="current-song-title" class="text-2xl font-semibold text-white leading-tight">Select a track</h2>
                    <p id="current-song-artist" class="text-purple-300 text-lg mt-1"></p>
                    <p id="current-song-info" class="text-sm text-gray-400 mt-2"></p>

                    <div class="mt-8">
                        <div class="progress-bar">
                            <div id="progress" class="progress w-0"></div>
                        </div>
                        <div class="flex justify-between text-xs mt-3 text-gray-400">
                            <span id="current-time">0:00</span>
                            <span id="total-duration">0:00</span>
                        </div>
                    </div>

                    <div class="flex items-center justify-center gap-10 mt-10">
                        <button id="prev-btn" class="text-gray-400 hover:text-white transition-all hover:scale-110">
                            <span class="iconify text-4xl" data-icon="mdi:skip-previous"></span>
                        </button>
                        
                        <button id="play-pause-btn" 
                                class="w-16 h-16 bg-white text-black rounded-3xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-xl">
                            <span class="iconify text-5xl" data-icon="mdi:play"></span>
                        </button>
                        
                        <button id="next-btn" class="text-gray-400 hover:text-white transition-all hover:scale-110">
                            <span class="iconify text-4xl" data-icon="mdi:skip-next"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Bottom Controls -->
            <div class="flex justify-end gap-4 mt-8">
                <button id="favorite-btn" class="p-4 hover:bg-white/10 rounded-2xl transition-all">
                    <span class="iconify text-3xl" data-icon="mdi:heart-outline"></span>
                </button>
                <button id="share-btn" class="p-4 hover:bg-white/10 rounded-2xl transition-all">
                    <span class="iconify text-3xl" data-icon="mdi:share-variant"></span>
                </button>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        // API Base (light obfuscation)
        const API_BASE = atob('aHR0cHM6Ly9zYWF2bi5zdW1pdC5jby9hcGkv') + 'search/songs';

        let songs = [];
        let currentIndex = -1;
        let isPlaying = false;

        async function searchSongs(query) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="flex flex-col items-center justify-center py-20">
                    <div class="w-12 h-12 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="text-gray-400 mt-6">Searching the cosmos...</p>
                </div>`;

            try {
                const res = await fetch(`${API_BASE}?query=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (data.success && data.data?.results?.length) {
                    songs = data.data.results.map(song => ({
                        id: song.id,
                        name: song.name,
                        artist: song.artists?.primary?.map(a => a.name).join(', ') || 'Unknown',
                        image: song.image?.find(i => i.quality === "500x500")?.url || 
                               song.image?.[0]?.url || '',
                        url: song.downloadUrl?.find(d => d.quality === "320kbps")?.url || 
                             song.downloadUrl?.[song.downloadUrl.length-1]?.url || '',
                        duration: song.duration || 0,
                        year: song.year,
                        playCount: song.playCount
                    }));
                    renderSongs();
                } else {
                    resultsDiv.innerHTML = `<div class="text-center py-20 text-gray-400 text-xl">No matches found</div>`;
                }
            } catch (e) {
                resultsDiv.innerHTML = `<div class="text-center py-20 text-red-400">Connection error. Try again.</div>`;
            }
        }

        function renderSongs() {
            const container = document.getElementById('results');
            container.innerHTML = '';

            songs.forEach((song, i) => {
                const min = Math.floor(song.duration / 60);
                const sec = song.duration % 60;
                const durationStr = `${min}:${sec < 10 ? '0' : ''}${sec}`;

                const row = document.createElement('div');
                row.className = `song-row glass rounded-3xl p-5 flex items-center gap-5 cursor-pointer group`;
                row.innerHTML = `
                    <img src="${song.image}" class="w-16 h-16 rounded-2xl object-cover shadow-lg" loading="lazy">
                    <div class="flex-1 min-w-0">
                        <p class="font-semibold text-lg text-white truncate">${song.name}</p>
                        <p class="text-purple-300 truncate">${song.artist}</p>
                        <div class="flex items-center gap-4 text-xs text-gray-400 mt-2">
                            <span>${durationStr}</span>
                            ${song.year ? `<span>${song.year}</span>` : ''}
                            ${song.playCount ? `<span class="flex items-center gap-1"><span class="iconify" data-icon="mdi:play-circle"></span>${(song.playCount/1000000).toFixed(1)}M</span>` : ''}
                        </div>
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 transition-all">
                        <button class="w-12 h-12 bg-purple-600 hover:bg-purple-500 rounded-2xl flex items-center justify-center">
                            <span class="iconify text-3xl" data-icon="mdi:play"></span>
                        </button>
                    </div>
                `;
                row.addEventListener('click', () => loadSong(i));
                container.appendChild(row);
            });
        }

        function loadSong(index) {
            currentIndex = index;
            const song = songs[index];
            if (!song) return;

            const audio = document.getElementById('audioPlayer');
            audio.src = song.url;
            audio.play();

            // Update Player
            document.getElementById('current-song-image').src = song.image;
            document.getElementById('current-song-title').textContent = song.name;
            document.getElementById('current-song-artist').textContent = song.artist;
            
            const info = [];
            if (song.year) info.push(song.year);
            if (song.duration) info.push(`${Math.floor(song.duration/60)}:${(song.duration%60).toString().padStart(2,'0')}`);
            document.getElementById('current-song-info').textContent = info.join(' • ');
        }

        // Audio Event Listeners
        const audio = document.getElementById('audioPlayer');
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100 || 0;
            document.getElementById('progress').style.width = pct + '%';
            document.getElementById('current-time').textContent = formatTime(audio.currentTime);
            document.getElementById('total-duration').textContent = formatTime(audio.duration);
        });

        audio.addEventListener('play', () => {
            isPlaying = true;
            document.getElementById('play-pause-btn').innerHTML = `<span class="iconify text-5xl" data-icon="mdi:pause"></span>`;
        });

        audio.addEventListener('pause', () => {
            isPlaying = false;
            document.getElementById('play-pause-btn').innerHTML = `<span class="iconify text-5xl" data-icon="mdi:play"></span>`;
        });

        // Controls
        document.getElementById('play-pause-btn').addEventListener('click', () => {
            isPlaying ? audio.pause() : audio.play();
        });

        document.getElementById('prev-btn').addEventListener('click', () => {
            if (currentIndex > 0) loadSong(currentIndex - 1);
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentIndex < songs.length - 1) loadSong(currentIndex + 1);
        });

        function formatTime(secs) {
            if (!secs || isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        // Search
        document.getElementById('searchForm').addEventListener('submit', e => {
            e.preventDefault();
            const q = document.getElementById('searchInput').value.trim();
            if (q) searchSongs(q);
        });

        // Debounced live search
        let timeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                const q = document.getElementById('searchInput').value.trim();
                if (q.length > 2) searchSongs(q);
            }, 450);
        });
    </script>
</body>
</html>
